<!-- data-plane/orchestrator/wazuh-ar/intellifim-orchestrator.conf

     UNUSED IN v1 (kept as documentation of the AR command snippet shape).
     The `<command>` + `<active-response>` blocks below are now inlined
     directly into data-plane/wazuh/manager/ossec.conf (mounted via
     /wazuh-config-mount). v2 cleanup: delete this file.

     Original intent (preserved for documentation):
     Wazuh Manager config snippet, included into ossec.conf at image-build
     time by data-plane/orchestrator/wazuh-ar/wazuh-manager.Dockerfile.
     Registers the `quarantine` AR command so dispatcher
     PUT /active-response calls with command="!quarantine0" route to
     /var/ossec/active-response/bin/quarantine.sh on the target agent. -->

<ossec_config>
  <command>
    <name>quarantine</name>
    <executable>quarantine.sh</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <command>quarantine</command>
    <location>local</location>
    <!-- No rules_id: this AR is dispatched only on demand via the manager
         REST API (PUT /active-response), not auto-fired by rule matches. -->
  </active-response>
</ossec_config>
