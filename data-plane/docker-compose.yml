name: intellifim-dataplane

networks:
  bus:
    driver: bridge
  victims:
    driver: bridge

services:
  kafka:
    # bitnami/kafka moved to a paid Tanzu subscription in mid-2025; the
    # same images are mirrored at bitnamilegacy/kafka. v2 should pick a
    # long-term home (Apache or Confluent).
    image: bitnamilegacy/kafka:3.7.0
    container_name: kafka
    networks: [bus]
    environment:
      # KRaft mode — no Zookeeper.
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "intellifim-dataplane"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    ports:
      - "${KAFKA_UI_HOST_PORT:-8080}:8080"

  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: wazuh-manager
    networks: [bus]
    hostname: wazuh-manager
    volumes:
      - ./wazuh/manager/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./wazuh/manager/local_rules.xml:/wazuh-config-mount/etc/rules/local_rules.xml:ro
      - wazuh_manager_data:/var/ossec/data
      - wazuh_manager_logs:/var/ossec/logs
      - wazuh_manager_queue:/var/ossec/queue
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/ossec/logs/alerts/alerts.json"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  wazuh-agent:
    image: wazuh/wazuh-agent:4.14.5
    container_name: wazuh-agent
    networks: [bus, victims]
    hostname: linux-endpoint-1
    depends_on:
      wazuh-manager:
        condition: service_started
    environment:
      WAZUH_MANAGER: "wazuh-manager"
      WAZUH_AGENT_NAME: "linux-endpoint-1"
      WAZUH_REGISTRATION_SERVER: "wazuh-manager"
    volumes:
      - ./wazuh/agent/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ${FIM_MONITORED_HOST_DIR:-./monitored}:/data/monitored
      - wazuh_agent_state:/var/ossec/queue
      - ./orchestrator/wazuh-ar/quarantine.sh:/var/ossec/active-response/bin/quarantine.sh:ro

  zeek-sensor:
    image: zeek/zeek:6.0.4
    container_name: zeek-sensor
    # Share victim-server's network namespace so Zeek can passively sniff
    # all traffic to/from victim-server. Docker's bridge driver does NOT
    # flood unicast frames between sibling containers — a Zeek container
    # on its own bridge interface (even with NET_ADMIN/NET_RAW + promiscuous
    # mode) only sees broadcast/multicast (mDNS, SSDP, ICMPv6 RA), not
    # the curl/HTTP unicast we want to inspect. Sharing the netns is the
    # standard fix and downstream consumers (Filebeat) read Zeek's logs
    # via the zeek_logs volume mount, not over the network.
    network_mode: "service:victim-server"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - victim-server
    volumes:
      - ./zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - zeek_logs:/var/log/zeek
    # In victim-server's netns the only NIC is eth0 (its sole network).
    command: >
      sh -c "mkdir -p /var/log/zeek &&
             zeek -i eth0 -C local 'Site::local_nets += {172.18.0.0/16}'"

  victim-server:
    image: nginx:1.27-alpine
    container_name: victim-server
    networks: [victims]
    hostname: victim-server

  victim-client:
    image: curlimages/curl:8.7.1
    container_name: victim-client
    networks: [victims]
    depends_on:
      - victim-server
    entrypoint: >
      sh -c "while true; do
               curl -s http://victim-server/ -o /dev/null;
               curl -s http://victim-server/index.html -o /dev/null;
               sleep 5;
             done"

  filebeat-wazuh:
    image: elastic/filebeat:8.13.4
    container_name: filebeat-wazuh
    user: root
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    volumes:
      - ./filebeat/filebeat-wazuh.yml:/usr/share/filebeat/filebeat.yml:ro
      - wazuh_manager_logs:/var/ossec/logs:ro
    command: ["filebeat", "-e", "--strict.perms=false"]

  filebeat-zeek:
    image: elastic/filebeat:8.13.4
    container_name: filebeat-zeek
    user: root
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
      zeek-sensor:
        condition: service_started
    volumes:
      - ./filebeat/filebeat-zeek.yml:/usr/share/filebeat/filebeat.yml:ro
      - zeek_logs:/var/log/zeek:ro
    command: ["filebeat", "-e", "--strict.perms=false"]

  normalizer-wazuh-fim:
    image: intellifim-normalizer:dev
    container_name: normalizer-wazuh-fim
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "wazuh.fim"
      KAFKA_BOOTSTRAP: "kafka:9092"

  normalizer-wazuh-auth:
    image: intellifim-normalizer:dev
    container_name: normalizer-wazuh-auth
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "wazuh.auth"
      KAFKA_BOOTSTRAP: "kafka:9092"

  normalizer-zeek-conn:
    image: intellifim-normalizer:dev
    container_name: normalizer-zeek-conn
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "zeek.conn"
      KAFKA_BOOTSTRAP: "kafka:9092"
      ZEEK_HOST_ID: "001"

  normalizer-zeek-dns:
    image: intellifim-normalizer:dev
    container_name: normalizer-zeek-dns
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "zeek.dns"
      KAFKA_BOOTSTRAP: "kafka:9092"
      ZEEK_HOST_ID: "001"

  normalizer-zeek-http:
    image: intellifim-normalizer:dev
    container_name: normalizer-zeek-http
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "zeek.http"
      KAFKA_BOOTSTRAP: "kafka:9092"
      ZEEK_HOST_ID: "001"

  normalizer-zeek-files:
    image: intellifim-normalizer:dev
    container_name: normalizer-zeek-files
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NORMALIZER_SOURCE: "zeek.files"
      KAFKA_BOOTSTRAP: "kafka:9092"
      ZEEK_HOST_ID: "001"

  correlation-engine:
    image: intellifim-correlator:dev
    container_name: correlation-engine
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      CORRELATION_WINDOW_SECONDS: "60"
      CONSUMER_GROUP: "correlation-engine"

  anomaly-detector:
    image: intellifim-anomaly-detector:dev
    container_name: anomaly-detector
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      CONSUMER_GROUP: "anomaly-detector"
      ANOMALY_THRESHOLD: "0.5"

  opa:
    image: openpolicyagent/opa:latest-debug
    container_name: opa
    networks: [bus]
    command: ["run", "--server", "--addr=:8181", "/policies"]
    volumes:
      - ./policy/policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8181/health"]
      interval: 5s
      timeout: 2s
      retries: 6

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [bus]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 6

  policy-engine:
    image: intellifim-policy:dev
    container_name: policy-engine
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      CONSUMER_GROUP: "policy-engine"
      OPA_URL: "http://opa:8181"
      REDIS_URL: "redis://redis:6379/0"
      THREAT_SCORE_WINDOW_SECONDS: "300"

  response-orchestrator:
    image: intellifim-orchestrator:dev
    container_name: response-orchestrator
    networks: [bus]
    depends_on:
      kafka:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - orchestrator_data:/data
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      CONSUMER_GROUP: "response-orchestrator"
      DB_PATH: "/data/approvals.db"
      API_HOST: "0.0.0.0"
      API_PORT: "8200"
      WAZUH_MANAGER_URL: "https://wazuh-manager:55000"
      WAZUH_API_USER: "wazuh"
      WAZUH_API_PASSWORD: "wazuh"
      TIER_LOW_THRESHOLD: "30"
      TIER_HIGH_THRESHOLD: "70"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8200/healthz', timeout=2).getcode()==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 6

  auth-backend:
    image: intellifim-auth-backend:dev
    build:
      context: .
      dockerfile: auth_backend/Dockerfile
    container_name: auth-backend
    networks: [bus]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - auth_backend_data:/data
    environment:
      DB_PATH: "/data/users.db"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_TTL_SECONDS: "28800"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).getcode()==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 6

  admin-console:
    image: chronos-ai-guard:dev
    build:
      context: ../chronos-ai-guard
      dockerfile: Dockerfile
      target: dev
    container_name: admin-console
    networks: [bus]
    depends_on:
      auth-backend:
        condition: service_healthy
      response-orchestrator:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:8080"
    volumes:
      - ../chronos-ai-guard/src:/app/src:ro
      - ../chronos-ai-guard/public:/app/public:ro
      - ../chronos-ai-guard/index.html:/app/index.html:ro
      # Vite needs these at /app root or path aliases (@/), Tailwind classes,
      # and shadcn imports all break inside the container.
      - ../chronos-ai-guard/vite.config.ts:/app/vite.config.ts:ro
      - ../chronos-ai-guard/tsconfig.json:/app/tsconfig.json:ro
      - ../chronos-ai-guard/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ../chronos-ai-guard/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ../chronos-ai-guard/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ../chronos-ai-guard/postcss.config.js:/app/postcss.config.js:ro
      - ../chronos-ai-guard/components.json:/app/components.json:ro
    environment:
      VITE_AUTH_API_URL: "http://localhost:8000"
      VITE_ORCHESTRATOR_API_URL: "http://localhost:8200"

volumes:
  kafka_data:
  wazuh_manager_data:
  wazuh_manager_logs:
  wazuh_manager_queue:
  wazuh_agent_state:
  zeek_logs:
  orchestrator_data:
  auth_backend_data:
