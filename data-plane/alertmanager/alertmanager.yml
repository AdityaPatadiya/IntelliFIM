global:
  resolve_timeout: 5m

route:
  receiver: "null-receiver"
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: "null-receiver"
    # No integrations in v1 — operator watches the Alertmanager web UI at :9093.
    # v2 will add Slack via slack_configs, email via email_configs, etc.
