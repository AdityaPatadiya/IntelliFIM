# =============================================================================
# IntelliFIM — DEV compose
#
# Run:
#   cp .env.docker.example .env.docker     # then fill in secrets
#   docker compose --env-file .env.docker up --build
#
# Source code is bind-mounted, so edits hot-reload (runserver + Vite).
# Use docker-compose.prod.yml for the production-style stack.
# =============================================================================

name: intellifim

# Common env passed to every Python service. YAML anchor saves repetition.
x-django-env: &django-env
  DEBUG: "True"
  ENVIRONMENT: development
  DEBUG_SQL: "False"
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY missing — see .env.docker.example}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY missing — see .env.docker.example}
  ALLOWED_HOSTS: "localhost,127.0.0.1,::1,backend"
  CORS_ALLOWED_ORIGINS: "http://localhost:8080"
  DB_ENGINE: django.db.backends.postgresql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-fim_db}
  DB_USER: ${POSTGRES_USER:-fim_user}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing}
  AUTH_DB_ENGINE: django.db.backends.postgresql
  AUTH_DB_HOST: postgres
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: auth_db
  AUTH_DB_USER: ${POSTGRES_USER:-fim_user}
  AUTH_DB_PASSWORD: ${POSTGRES_PASSWORD}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CACHE_REDIS_URL: redis://redis:6379/2
  FIM_EVENTS_REDIS_URL: redis://redis:6379/3
  FIM_LOG_DIR: /app/logs
  FIM_BACKUP_DIR: /app/backups
  FIM_REPORT_DIR: /app/reports

x-django-build: &django-build
  build:
    context: .
    dockerfile: Dockerfile
    args:
      REQUIREMENTS: requirements/dev.txt
  image: intellifim-backend:dev

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fim_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing}
      POSTGRES_DB: ${POSTGRES_DB:-fim_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fim_user} -d ${POSTGRES_DB:-fim_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  backend:
    <<: *django-build
    environment:
      <<: *django-env
      RUN_MIGRATIONS: "1"   # only the web service runs migrations
    volumes:
      - ./IntelliFIM:/app
      - fim_logs:/app/logs
      - fim_backups:/app/backups
      - fim_reports:/app/reports
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  celery-worker:
    <<: *django-build
    environment:
      <<: *django-env
    volumes:
      - ./IntelliFIM:/app
      # Host directory tree exposed to the worker for FIM monitoring.
      # UI should be told to watch /data/monitored/<subdir>.
      - ${FIM_MONITORED_HOST_DIR:-./Example}:/data/monitored:rw
      - fim_logs:/app/logs
      - fim_backups:/app/backups
      - fim_reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command:
      - "celery"
      - "-A"
      - "IntelliFIM"
      - "worker"
      - "-l"
      - "info"
      - "-Q"
      - "default,fim_monitor,fim_scans,fim_backup"

  celery-beat:
    <<: *django-build
    environment:
      <<: *django-env
    volumes:
      - ./IntelliFIM:/app
      - fim_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command:
      - "celery"
      - "-A"
      - "IntelliFIM"
      - "beat"
      - "-l"
      - "info"
      - "--scheduler"
      - "django_celery_beat.schedulers:DatabaseScheduler"

  frontend:
    build:
      context: ./chronos-ai-guard
      dockerfile: Dockerfile
      target: dev
    image: intellifim-frontend:dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./chronos-ai-guard:/app
      # Anonymous-style named volume for node_modules so the host's empty
      # node_modules (or different platform's) doesn't shadow the container's.
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  fim_logs:
  fim_backups:
  fim_reports:
  frontend_node_modules:
