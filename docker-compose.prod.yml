# =============================================================================
# IntelliFIM — PRODUCTION compose (single-host).
#
# Run:
#   cp .env.docker.example .env.docker     # then fill in secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.docker up -d --build
#
# Differences vs dev compose:
#   - No source bind-mounts (code baked into the image).
#   - Backend served by Daphne (4 workers via gunicorn would also work — see
#     Dockerfile CMD comment if you want to switch).
#   - Frontend served by nginx, proxying /api, /admin, /static, /ws to backend.
#   - Postgres / Redis ports NOT exposed to host (internal network only).
#   - All services restart unless explicitly stopped.
#   - DEBUG=False, requirements/prod.txt.
# =============================================================================

name: intellifim-prod

x-django-env: &django-env
  DEBUG: "False"
  ENVIRONMENT: production
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY missing}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY missing}
  # Allow the public hostname users hit AND the in-cluster service name so
  # the backend accepts requests from the nginx container.
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
  DB_ENGINE: django.db.backends.postgresql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-fim_db}
  DB_USER: ${POSTGRES_USER:-fim_user}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing}
  AUTH_DB_ENGINE: django.db.backends.postgresql
  AUTH_DB_HOST: postgres
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: auth_db
  AUTH_DB_USER: ${POSTGRES_USER:-fim_user}
  AUTH_DB_PASSWORD: ${POSTGRES_PASSWORD}
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CACHE_REDIS_URL: redis://redis:6379/2
  FIM_EVENTS_REDIS_URL: redis://redis:6379/3
  FIM_LOG_DIR: /app/logs
  FIM_BACKUP_DIR: /app/backups
  FIM_REPORT_DIR: /app/reports
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
  SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}

x-django-build: &django-build
  build:
    context: .
    dockerfile: Dockerfile
    args:
      REQUIREMENTS: requirements/prod.txt
  image: intellifim-backend:prod
  restart: unless-stopped

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fim_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing}
      POSTGRES_DB: ${POSTGRES_DB:-fim_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fim_user} -d ${POSTGRES_DB:-fim_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port exposure in prod — only reachable via the compose network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    <<: *django-build
    environment:
      <<: *django-env
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    volumes:
      - fim_logs:/app/logs
      - fim_backups:/app/backups
      - fim_reports:/app/reports
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Daphne handles HTTP + WebSockets natively. To switch to gunicorn+uvicorn
    # (more workers, better signal handling), replace with:
    #   ["gunicorn", "IntelliFIM.asgi:application",
    #    "-k", "uvicorn.workers.UvicornWorker",
    #    "--workers", "4", "--bind", "0.0.0.0:8000"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "IntelliFIM.asgi:application"]

  celery-worker:
    <<: *django-build
    environment:
      <<: *django-env
    volumes:
      - ${FIM_MONITORED_HOST_DIR:-./Example}:/data/monitored:rw
      - fim_logs:/app/logs
      - fim_backups:/app/backups
      - fim_reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command:
      - "celery"
      - "-A"
      - "IntelliFIM"
      - "worker"
      - "-l"
      - "info"
      - "--concurrency"
      - "4"
      - "-Q"
      - "default,fim_monitor,fim_scans,fim_backup"

  celery-beat:
    <<: *django-build
    environment:
      <<: *django-env
    volumes:
      - fim_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command:
      - "celery"
      - "-A"
      - "IntelliFIM"
      - "beat"
      - "-l"
      - "info"
      - "--scheduler"
      - "django_celery_beat.schedulers:DatabaseScheduler"

  frontend:
    build:
      context: ./chronos-ai-guard
      dockerfile: Dockerfile
      target: prod
      args:
        # Empty so the SPA hits relative URLs that nginx proxies. Override
        # only if the API is on a different host.
        VITE_API_URL: ${VITE_API_URL:-}
    image: intellifim-frontend:prod
    restart: unless-stopped
    # nginx in this image also proxies /static/ to the backend container,
    # so collectstatic output (in the static_files volume on backend) is
    # served via the backend, not the frontend image.
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  fim_logs:
  fim_backups:
  fim_reports:
  static_files:
