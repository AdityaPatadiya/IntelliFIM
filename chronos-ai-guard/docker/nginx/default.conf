# Production nginx config for the chronos-ai-guard frontend.
#
# Serves the React static bundle and proxies API/admin/static/SSE traffic to
# the backend container. Same-origin = no CORS headache.

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-running connections (SSE, future WebSockets) need long timeouts and
    # disabled buffering so events flush to the client immediately.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # SPA: any unknown path falls back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend_upstream;
    }

    # Static assets collected by Django (admin CSS, DRF browsable API CSS)
    location /static/ {
        proxy_pass http://backend_upstream;
    }

    # WebSocket endpoint for Channels (currently unused but reserved)
    location /ws/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}

# Required for the `Connection: upgrade` header above (WebSockets).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
